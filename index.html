<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pool + Lernen</title>

<!-- Supabase JS Client -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: linear-gradient(135deg, #0f172a 0%, #1e1b3a 100%);
    color: #e2e8f0;
    min-height: 100vh;
  }
  #app { max-width: 900px; margin: 0 auto; padding: 16px; }
  .auth-wrap { min-height: 90vh; display: flex; align-items: center; justify-content: center; }
  .auth-card {
    background: rgba(30,41,59,0.7); backdrop-filter: blur(12px);
    border: 1px solid rgba(148,163,184,0.15); border-radius: 20px;
    padding: 36px; width: 100%; max-width: 380px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }
  .auth-card h1 {
    font-size: 24px; margin-bottom: 6px;
    background: linear-gradient(90deg,#818cf8,#c084fc);
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .auth-card p.sub { color: #94a3b8; font-size: 13px; margin-bottom: 22px; }
  .auth-tabs { display: flex; gap: 8px; margin-bottom: 18px; }
  .auth-tab {
    flex: 1; text-align: center; padding: 8px; border-radius: 10px; cursor: pointer;
    background: rgba(255,255,255,0.05); font-size: 14px; color: #94a3b8; transition: 0.2s;
  }
  .auth-tab.active { background: linear-gradient(90deg,#6366f1,#8b5cf6); color: white; }
  input, select, textarea {
    width: 100%; padding: 11px 14px; margin-bottom: 12px;
    background: rgba(15,23,42,0.6); border: 1px solid rgba(148,163,184,0.2);
    border-radius: 10px; color: #e2e8f0; font-size: 14px; outline: none;
    transition: border-color 0.2s;
  }
  input:focus, select:focus, textarea:focus { border-color: #818cf8; }
  textarea { resize: vertical; min-height: 70px; font-family: inherit; }
  button {
    cursor: pointer; border: none; border-radius: 10px; font-size: 14px;
    padding: 11px 18px; transition: 0.15s; font-weight: 500;
  }
  button:active { transform: scale(0.97); }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-primary { background: linear-gradient(90deg,#6366f1,#8b5cf6); color: white; width: 100%; }
  .btn-primary:hover { box-shadow: 0 4px 16px rgba(139,92,246,0.4); }
  .btn-sm { padding: 7px 12px; font-size: 13px; background: rgba(255,255,255,0.08); color: #e2e8f0; }
  .btn-sm:hover { background: rgba(255,255,255,0.15); }
  .btn-accent { background: linear-gradient(90deg,#22c55e,#16a34a); color: white; }
  .error-msg { color: #f87171; font-size: 13px; margin-bottom: 10px; min-height: 14px; }
  .topbar { display: flex; justify-content: space-between; align-items: center; padding: 12px 4px; margin-bottom: 16px; }
  .topbar h2 { font-size: 18px; }
  .topbar .me { font-size: 13px; color: #94a3b8; }
  .tabs {
    display: flex; gap: 6px; overflow-x: auto; padding-bottom: 8px; margin-bottom: 18px;
    border-bottom: 1px solid rgba(148,163,184,0.12);
  }
  .tab { padding: 9px 16px; border-radius: 10px 10px 0 0; cursor: pointer; color: #94a3b8; font-size: 14px; white-space: nowrap; transition: 0.2s; }
  .tab.active { color: white; background: rgba(139,92,246,0.18); border-bottom: 2px solid #8b5cf6; }
  .tab:hover { color: #e2e8f0; }
  .card { background: rgba(30,41,59,0.6); border: 1px solid rgba(148,163,184,0.12); border-radius: 16px; padding: 18px; margin-bottom: 14px; }
  .card.thread { border-color: rgba(139,92,246,0.5); background: rgba(139,92,246,0.08); }
  .card h3 { font-size: 16px; margin-bottom: 6px; }
  .card .meta { font-size: 12px; color: #94a3b8; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
  .card p.body { font-size: 14px; line-height: 1.5; color: #cbd5e1; }
  .badge { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 6px; background: linear-gradient(90deg,#6366f1,#8b5cf6); color: white; margin-left: 6px; margin-bottom:4px; }
  .badge.me { background: linear-gradient(90deg,#22c55e,#16a34a); }
  .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .section-title { font-size: 13px; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.05em; margin: 18px 0 8px; }
  .empty { color: #64748b; font-size: 14px; padding: 20px; text-align: center; }
  .loading { text-align: center; padding: 40px; color: #94a3b8; }
  .forum-layout { display: flex; gap: 16px; }
  .room-list { width: 180px; flex-shrink: 0; }
  .room-item { padding: 10px 12px; border-radius: 10px; cursor: pointer; font-size: 14px; margin-bottom: 6px; color: #94a3b8; transition: 0.15s; }
  .room-item.active { background: rgba(139,92,246,0.2); color: white; }
  .room-item:hover { background: rgba(255,255,255,0.05); }
  .forum-main { flex: 1; min-width: 0; }
  .msg-list { max-height: 380px; overflow-y: auto; margin-bottom: 12px; }
  .msg { background: rgba(15,23,42,0.5); border-radius: 10px; padding: 10px 12px; margin-bottom: 8px; }
  .msg .who-row { display: flex; align-items: center; gap: 6px; }
  .msg .who { font-size: 12px; color: #a78bfa; font-weight: 600; }
  .msg .when { font-size: 11px; color: #64748b; margin-left: 6px; }
  .msg .text { font-size: 14px; margin-top: 4px; color: #e2e8f0; }
  .interest-list { font-size: 13px; color: #94a3b8; margin: 8px 0; }
  .winner { color: #4ade80; font-weight: 600; }
  .like-x { cursor: pointer; margin-left: 4px; opacity: 0.8; }
  .like-x:hover { opacity: 1; }
  .avatar-clickable { cursor: pointer; transition: 0.15s; }
  .avatar-clickable:hover { opacity: 0.8; transform: scale(1.05); }
  #draw-overlay { position: fixed; inset: 0; background: rgba(5,8,20,0.92); display: flex; align-items: center; justify-content: center; z-index: 1000; flex-direction: column; gap: 18px; padding: 20px; }
  #wheel-wrap { position: relative; width: 260px; height: 260px; }
  #wheel { width: 260px; height: 260px; border-radius: 50%; border: 6px solid #1e1b3a; box-shadow: 0 0 40px rgba(139,92,246,0.4); }
  #wheel-pointer { position: absolute; top: -14px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 12px solid transparent; border-right: 12px solid transparent; border-top: 20px solid #f59e0b; }
  #wheel-legend { display: flex; flex-wrap: wrap; gap: 8px; max-width: 340px; justify-content: center; }
  #draw-result { color: white; font-size: 18px; font-weight: 600; min-height: 50px; text-align: center; }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-thumb { background: rgba(148,163,184,0.3); border-radius: 4px; }
</style>
</head>
<body>
<div id="app"></div>

<script>
// =========================================================
// SUPABASE-VERBINDUNG
// =========================================================
const SUPABASE_URL = 'https://djbyqunkmvhphbgfrktk.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_nOhWqOJCjih1MC4FseHzkQ_K48hPy_x';
// =========================================================

const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const FAKE_EMAIL_DOMAIN = 'lerncommunity.local';
const PALETTE_COLORS = ['#8b5cf6','#6366f1','#22c55e','#f59e0b','#ef4444','#06b6d4','#ec4899','#84cc16'];

let currentUser = null;
let activeTab = 'home';
let authMode = 'login';
let activeRoom = null;
let authError = '';
let cache = { feed: [], likes: {}, materials: [], rooms: [], messages: {}, events: [], raffles: [], profileAvatars: {} };
let drawState = null;

function esc(s) {
  const d = document.createElement('div');
  d.textContent = (s === undefined || s === null) ? '' : String(s);
  return d.innerHTML;
}
function fmtTime(ts) {
  const d = new Date(ts);
  return d.toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit' }) + ' ' +
         d.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });
}
function fakeEmail(username) { return username.toLowerCase().replace(/[^a-z0-9_]/g, '') + '@' + FAKE_EMAIL_DOMAIN; }
function translateError(msg) {
  if (!msg) return 'Unbekannter Fehler.';
  if (msg.includes('duplicate') || msg.includes('already registered')) return 'Dieser Benutzername ist schon vergeben.';
  if (msg.includes('Invalid login')) return 'Benutzername oder Passwort falsch.';
  if (msg.includes('Password should be')) return 'Passwort muss mind. 6 Zeichen haben.';
  return msg;
}
function colorFromName(name) {
  let hash = 0;
  const s = name || '?';
  for (let i = 0; i < s.length; i++) hash = (hash * 31 + s.charCodeAt(i)) >>> 0;
  return PALETTE_COLORS[hash % PALETTE_COLORS.length];
}
function avatarHTML(username, size) {
  size = size || 28;
  const url = cache.profileAvatars[username];
  if (url) {
    return `<img src="${esc(url)}" style="width:${size}px;height:${size}px;border-radius:50%;object-fit:cover;flex-shrink:0;" />`;
  }
  const color = colorFromName(username);
  const initial = (username || '?').charAt(0).toUpperCase();
  return `<div style="width:${size}px;height:${size}px;border-radius:50%;background:${color};color:white;display:flex;align-items:center;justify-content:center;font-size:${Math.floor(size*0.45)}px;font-weight:600;flex-shrink:0;">${esc(initial)}</div>`;
}
async function loadProfiles() {
  const { data } = await sb.from('profiles').select('username, avatar_url');
  cache.profileAvatars = {};
  (data || []).forEach(p => { if (p.avatar_url) cache.profileAvatars[p.username] = p.avatar_url; });
}
async function uploadAvatar(file) {
  if (!file) return;
  const ext = (file.name.split('.').pop() || 'jpg').toLowerCase();
  const path = currentUser.toLowerCase().replace(/[^a-z0-9_]/g, '_') + '.' + ext;
  const { error: upErr } = await sb.storage.from('avatars').upload(path, file, { upsert: true });
  if (upErr) { alert('Avatar-Upload fehlgeschlagen: ' + upErr.message); return; }
  const { data: pub } = sb.storage.from('avatars').getPublicUrl(path);
  const { data: userData } = await sb.auth.getUser();
  await sb.from('profiles').update({ avatar_url: pub.publicUrl + '?t=' + Date.now() }).eq('id', userData.user.id);
  await renderApp();
}

// ---------- Auth ----------
function renderAuth() {
  const app = document.getElementById('app');
  app.innerHTML = `
    <div class="auth-wrap">
      <div class="auth-card">
        <h1>📚 Pool + Lernen</h1>
        <p class="sub">Für uns und unsere Kommilitonen</p>
        <div class="auth-tabs">
          <div class="auth-tab ${authMode==='login'?'active':''}" onclick="setAuthMode('login')">Einloggen</div>
          <div class="auth-tab ${authMode==='register'?'active':''}" onclick="setAuthMode('register')">Registrieren</div>
        </div>
        <div class="error-msg">${esc(authError)}</div>
        <input id="auth-user" placeholder="Benutzername" autocomplete="username" />
        <input id="auth-pw" type="password" placeholder="Passwort (mind. 6 Zeichen)" autocomplete="current-password" />
        <button class="btn-primary" id="auth-btn" onclick="${authMode==='login' ? 'doLogin()' : 'doRegister()'}">
          ${authMode==='login' ? 'Einloggen' : 'Account erstellen'}
        </button>
      </div>
    </div>
  `;
  document.getElementById('auth-pw').addEventListener('keydown', e => {
    if (e.key === 'Enter') authMode === 'login' ? doLogin() : doRegister();
  });
}
function setAuthMode(m) { authMode = m; authError = ''; renderAuth(); }

async function doRegister() {
  const u = document.getElementById('auth-user').value.trim();
  const p = document.getElementById('auth-pw').value;
  if (!u || !p) { authError = 'Bitte Benutzername und Passwort eingeben.'; renderAuth(); return; }
  const btn = document.getElementById('auth-btn'); btn.disabled = true; btn.textContent = 'Lädt...';
  const { data, error } = await sb.auth.signUp({
    email: fakeEmail(u), password: p, options: { data: { username: u } }
  });
  if (error) { authError = translateError(error.message); renderAuth(); return; }
  currentUser = u;
  renderApp();
}
async function doLogin() {
  const u = document.getElementById('auth-user').value.trim();
  const p = document.getElementById('auth-pw').value;
  if (!u || !p) { authError = 'Bitte Benutzername und Passwort eingeben.'; renderAuth(); return; }
  const btn = document.getElementById('auth-btn'); btn.disabled = true; btn.textContent = 'Lädt...';
  const { data, error } = await sb.auth.signInWithPassword({ email: fakeEmail(u), password: p });
  if (error) { authError = translateError(error.message); renderAuth(); return; }
  currentUser = u;
  renderApp();
}
async function doLogout() { await sb.auth.signOut(); currentUser = null; authError = ''; renderAuth(); }

// ---------- App Shell ----------
async function renderApp() {
  await loadProfiles();
  const app = document.getElementById('app');
  app.innerHTML = `
    <div class="topbar">
      <h2>📚 Pool + Lernen</h2>
      <div class="row">
        <div class="avatar-clickable" title="Profilbild ändern" onclick="document.getElementById('avatar-file').click()">${avatarHTML(currentUser, 32)}</div>
        <input type="file" id="avatar-file" accept="image/*" style="display:none" onchange="uploadAvatar(this.files[0])" />
        <span class="me">Eingeloggt als <strong>${esc(currentUser)}</strong></span>
        <button class="btn-sm" onclick="doLogout()">Logout</button>
      </div>
    </div>
    <div class="tabs">
      ${tabBtn('home','🏠 Start')}
      ${tabBtn('materials','📂 Material')}
      ${tabBtn('forum','💬 Forum')}
      ${tabBtn('events','📅 Veranstaltungen')}
      ${tabBtn('raffles','🎟️ Tickets')}
    </div>
    <div id="tab-content"><div class="loading">Lädt...</div></div>
  `;
  loadTab(activeTab);
}
function tabBtn(id, label) { return `<div class="tab ${activeTab===id?'active':''}" onclick="switchTab('${id}')">${label}</div>`; }
function switchTab(id) { activeTab = id; renderApp(); }

async function loadTab(tab) {
  if (tab === 'home') { await loadFeed(); renderHome(); }
  else if (tab === 'materials') { await loadMaterials(); renderMaterials(); }
  else if (tab === 'forum') { await loadRooms(); if (!activeRoom) activeRoom = cache.rooms[0]?.name; await loadMessages(); renderForum(); }
  else if (tab === 'events') { await loadEvents(); renderEvents(); }
  else if (tab === 'raffles') { await loadRaffles(); renderRaffles(); }
}
function refreshTab(tab) { loadTab(tab); }

// ---------- HOME / NEWS / LIKES ----------
async function loadFeed() {
  const { data } = await sb.from('posts').select('*').order('created_at', { ascending: false });
  cache.feed = data || [];
  const { data: likeData } = await sb.from('post_likes').select('*');
  const likes = {};
  (likeData || []).forEach(l => { (likes[l.post_id] = likes[l.post_id] || []).push(l.username); });
  cache.likes = likes;
}
function renderLikeLeaderboard() {
  const counts = {};
  Object.values(cache.likes).forEach(arr => arr.forEach(u => { counts[u] = (counts[u]||0) + 1; }));
  const sorted = Object.entries(counts).sort((a,b) => b[1] - a[1]);
  if (!sorted.length) return '';
  return `
    <div class="card">
      <h3>💜 Like-Rangliste</h3>
      <div class="meta" style="margin-bottom:10px;">Wer hat am meisten Likes vergeben?</div>
      <div class="row">${sorted.map(([u,c]) => `<span class="badge ${u===currentUser?'me':''}">${esc(u)}: ${c}</span>`).join('')}</div>
    </div>
  `;
}
function renderHome() {
  const c = document.getElementById('tab-content');
  const threads = cache.feed.filter(p => p.is_thread);
  const rest = cache.feed.filter(p => !p.is_thread);
  c.innerHTML = `
    <div class="card">
      <h3>Neuer Beitrag</h3>
      <input id="post-title" placeholder="Titel" />
      <textarea id="post-content" placeholder="Was gibt's Neues?"></textarea>
      <label class="row" style="font-size:13px;color:#94a3b8;margin-bottom:10px;">
        <input type="checkbox" id="post-thread" style="width:auto;margin:0;" /> Als wichtige News markieren
      </label>
      <button class="btn-primary" onclick="addPost()">Posten</button>
    </div>
    ${renderLikeLeaderboard()}
    <div class="row" style="justify-content:space-between;">
      <div class="section-title">News & Threads</div>
      <button class="btn-sm" onclick="refreshTab('home')">🔄 Aktualisieren</button>
    </div>
    ${threads.length ? threads.map(postCard).join('') : '<div class="empty">Noch keine News.</div>'}
    <div class="section-title">Alle Beiträge</div>
    ${rest.length ? rest.map(postCard).join('') : '<div class="empty">Noch keine weiteren Beiträge.</div>'}
  `;
}
function postCard(p) {
  const likers = cache.likes[p.id] || [];
  const iLiked = likers.includes(currentUser);
  return `
    <div class="card ${p.is_thread?'thread':''}">
      <h3>${esc(p.title)} ${p.is_thread?'<span class="badge">News</span>':''}</h3>
      <div class="meta">${avatarHTML(p.author,20)} ${esc(p.author)} · ${fmtTime(p.created_at)}</div>
      <p class="body">${esc(p.content)}</p>
      <div style="margin-top:10px;">
        <button class="btn-sm" onclick="toggleLike('${p.id}')">${iLiked ? '💜' : '🤍'} ${likers.length}</button>
        ${likers.length ? `<div style="font-size:12px;color:#94a3b8;margin-top:6px;">geliked von ${likers.map(esc).join(', ')}</div>` : ''}
      </div>
    </div>
  `;
}
async function addPost() {
  const title = document.getElementById('post-title').value.trim();
  const content = document.getElementById('post-content').value.trim();
  const is_thread = document.getElementById('post-thread').checked;
  if (!title || !content) return;
  await sb.from('posts').insert({ title, content, is_thread, author: currentUser });
  await loadFeed(); renderHome();
}
async function toggleLike(postId) {
  const likers = cache.likes[postId] || [];
  if (likers.includes(currentUser)) {
    await sb.from('post_likes').delete().eq('post_id', postId).eq('username', currentUser);
  } else {
    await sb.from('post_likes').insert({ post_id: postId, username: currentUser });
  }
  await loadFeed(); renderHome();
}

// ---------- MATERIALS ----------
async function loadMaterials() {
  const { data } = await sb.from('materials').select('*').order('created_at', { ascending: false });
  cache.materials = data || [];
}
function renderMaterials() {
  const c = document.getElementById('tab-content');
  c.innerHTML = `
    <div class="card">
      <h3>Neues Material teilen</h3>
      <input id="mat-title" placeholder="Titel (z.B. 'SWEN2 Übung 3')" />
      <input id="mat-subject" placeholder="Fach / Kurs" />
      <input id="mat-link" placeholder="Link (Drive/Dropbox) — optional" />
      <textarea id="mat-note" placeholder="Notiz / Beschreibung — optional"></textarea>
      <label style="font-size:12px;color:#94a3b8;display:block;margin-bottom:6px;">Datei hochladen (PDF etc., max. 50MB) — optional</label>
      <input id="mat-file" type="file" style="margin-bottom:12px;" />
      <button class="btn-primary" id="mat-submit-btn" onclick="addMaterial()">Hinzufügen</button>
    </div>
    <div class="row" style="justify-content:space-between;">
      <div class="section-title">Geteilte Unterlagen</div>
      <button class="btn-sm" onclick="refreshTab('materials')">🔄 Aktualisieren</button>
    </div>
    ${cache.materials.length ? cache.materials.map(m => `
      <div class="card">
        <h3>${esc(m.title)} <span class="badge">${esc(m.subject||'Allgemein')}</span></h3>
        <div class="meta">${avatarHTML(m.author,20)} ${esc(m.author)} · ${fmtTime(m.created_at)}</div>
        ${m.link ? `<p class="body">🔗 <a href="${esc(m.link)}" target="_blank" style="color:#a78bfa;">${esc(m.link)}</a></p>` : ''}
        ${m.file_url ? `<p class="body">📎 <a href="${esc(m.file_url)}" target="_blank" style="color:#a78bfa;">${esc(m.file_name||'Datei herunterladen')}</a></p>` : ''}
        ${m.note ? `<p class="body">${esc(m.note)}</p>` : ''}
      </div>
    `).join('') : '<div class="empty">Noch keine Unterlagen geteilt.</div>'}
  `;
}
async function addMaterial() {
  const title = document.getElementById('mat-title').value.trim();
  const subject = document.getElementById('mat-subject').value.trim();
  const link = document.getElementById('mat-link').value.trim();
  const note = document.getElementById('mat-note').value.trim();
  const file = document.getElementById('mat-file').files[0];
  if (!title) return;
  const btn = document.getElementById('mat-submit-btn');
  btn.disabled = true; btn.textContent = file ? 'Lädt hoch...' : 'Lädt...';
  let file_url = null, file_name = null;
  if (file) {
    const path = Date.now() + '_' + file.name.replace(/[^a-zA-Z0-9._-]/g, '_');
    const { error: upErr } = await sb.storage.from('materials').upload(path, file);
    if (upErr) { alert('Datei-Upload fehlgeschlagen: ' + upErr.message); btn.disabled = false; btn.textContent = 'Hinzufügen'; return; }
    const { data } = sb.storage.from('materials').getPublicUrl(path);
    file_url = data.publicUrl; file_name = file.name;
  }
  await sb.from('materials').insert({ title, subject, link, note, file_url, file_name, author: currentUser });
  await loadMaterials(); renderMaterials();
}

// ---------- FORUM ----------
async function loadRooms() {
  const { data } = await sb.from('forum_rooms').select('*').order('name', { ascending: true });
  cache.rooms = data || [];
}
async function loadMessages() {
  if (!activeRoom) { cache.messages[activeRoom] = []; return; }
  const { data } = await sb.from('forum_messages').select('*').eq('room_name', activeRoom).order('created_at', { ascending: true });
  cache.messages[activeRoom] = data || [];
}
function renderForum() {
  const c = document.getElementById('tab-content');
  const msgs = cache.messages[activeRoom] || [];
  c.innerHTML = `
    <div class="row" style="justify-content:flex-end;margin-bottom:8px;">
      <button class="btn-sm" onclick="refreshTab('forum')">🔄 Aktualisieren</button>
    </div>
    <div class="forum-layout">
      <div class="room-list">
        ${cache.rooms.map(r => `<div class="room-item ${r.name===activeRoom?'active':''}" onclick="selectRoom('${esc(r.name)}')">${esc(r.name)}</div>`).join('')}
        <input id="new-room" placeholder="Neuer Raum..." style="margin-top:10px;" />
        <button class="btn-sm" style="width:100%;" onclick="addRoom()">+ Raum erstellen</button>
      </div>
      <div class="forum-main">
        <div class="card" style="margin-bottom:10px;">
          <h3 style="margin-bottom:10px;">${esc(activeRoom||'')}</h3>
          <div class="msg-list">
            ${msgs.length ? msgs.map(m => `
              <div class="msg">
                <div class="who-row">${avatarHTML(m.author,20)}<span class="who">${esc(m.author)}</span><span class="when">${fmtTime(m.created_at)}</span></div>
                <div class="text">${esc(m.text)}</div>
              </div>
            `).join('') : '<div class="empty">Noch keine Nachrichten in diesem Raum.</div>'}
          </div>
          <div class="row">
            <input id="msg-input" placeholder="Nachricht schreiben..." style="flex:1;margin-bottom:0;" />
            <button class="btn-primary" style="width:auto;" onclick="sendMsg()">Senden</button>
          </div>
        </div>
      </div>
    </div>
  `;
  document.getElementById('msg-input').addEventListener('keydown', e => { if (e.key === 'Enter') sendMsg(); });
}
async function selectRoom(r) { activeRoom = r; await loadMessages(); renderForum(); }
async function addRoom() {
  const name = document.getElementById('new-room').value.trim();
  if (!name) return;
  await sb.from('forum_rooms').insert({ name });
  activeRoom = name;
  await loadRooms(); await loadMessages(); renderForum();
}
async function sendMsg() {
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if (!text || !activeRoom) return;
  await sb.from('forum_messages').insert({ room_name: activeRoom, author: currentUser, text });
  await loadMessages(); renderForum();
}

// ---------- EVENTS ----------
async function loadEvents() {
  const { data } = await sb.from('events').select('*').order('date', { ascending: true });
  cache.events = data || [];
}
function renderEvents() {
  const c = document.getElementById('tab-content');
  c.innerHTML = `
    <div class="card">
      <h3>Neue Veranstaltung</h3>
      <input id="ev-title" placeholder="Titel" />
      <input id="ev-date" type="date" />
      <input id="ev-location" placeholder="Ort" />
      <textarea id="ev-desc" placeholder="Beschreibung — optional"></textarea>
      <button class="btn-primary" onclick="addEvent()">Hinzufügen</button>
    </div>
    <div class="row" style="justify-content:space-between;">
      <div class="section-title">Anstehende Veranstaltungen</div>
      <button class="btn-sm" onclick="refreshTab('events')">🔄 Aktualisieren</button>
    </div>
    ${cache.events.length ? cache.events.map(ev => `
      <div class="card">
        <h3>${esc(ev.title)}</h3>
        <div class="meta">${avatarHTML(ev.author,20)} 📅 ${esc(ev.date)} ${ev.location ? '· 📍 '+esc(ev.location) : ''} · von ${esc(ev.author)}</div>
        ${ev.description ? `<p class="body">${esc(ev.description)}</p>` : ''}
      </div>
    `).join('') : '<div class="empty">Noch keine Veranstaltungen.</div>'}
  `;
}
async function addEvent() {
  const title = document.getElementById('ev-title').value.trim();
  const date = document.getElementById('ev-date').value;
  const location = document.getElementById('ev-location').value.trim();
  const description = document.getElementById('ev-desc').value.trim();
  if (!title || !date) return;
  await sb.from('events').insert({ title, date, location, description, author: currentUser });
  await loadEvents(); renderEvents();
}

// ---------- RAFFLES (Ticket-Verlosung mit Glücksrad) ----------
async function loadRaffles() {
  const { data } = await sb.from('raffles').select('*, raffle_interest(*)').order('created_at', { ascending: false });
  cache.raffles = data || [];
}
function renderRaffles() {
  const c = document.getElementById('tab-content');
  c.innerHTML = `
    <div class="card">
      <h3>Neue Ticket-Verlosung</h3>
      <input id="raf-title" placeholder="Für welche Veranstaltung?" />
      <input id="raf-count" type="number" min="1" placeholder="Wie viele Tickets?" />
      <button class="btn-primary" onclick="addRaffle()">Verlosung erstellen</button>
    </div>
    <div class="row" style="justify-content:space-between;">
      <div class="section-title">Laufende & vergangene Verlosungen</div>
      <button class="btn-sm" onclick="refreshTab('raffles')">🔄 Aktualisieren</button>
    </div>
    ${cache.raffles.length ? cache.raffles.map(raffleCard).join('') : '<div class="empty">Noch keine Verlosungen.</div>'}
  `;
}
function raffleCard(r) {
  const interested = r.raffle_interest || [];
  const totalWanted = interested.reduce((s,i) => s + i.count, 0);
  return `
    <div class="card">
      <h3>🎟️ ${esc(r.title)}</h3>
      <div class="meta">${avatarHTML(r.owner,20)} ${r.ticket_count} Tickets · erstellt von ${esc(r.owner)} · ${fmtTime(r.created_at)}</div>
      ${interested.length ? `
        <div class="row">
          ${interested.map(i => `<span class="badge ${i.username===currentUser?'me':''}">${esc(i.username)}: ${i.count}${i.username===currentUser && !r.drawn ? ` <span class="like-x" onclick="removeEntry('${i.id}')">✕</span>` : ''}</span>`).join('')}
        </div>
        <div class="interest-list">Insgesamt ${totalWanted} gewünschte Tickets aus ${interested.length} Anmeldungen — für alle einsehbar</div>
      ` : '<div class="empty">Noch keine Anmeldungen.</div>'}
      ${r.drawn ? `
        <p class="body" style="margin-top:8px;"><strong>Ergebnis der Verlosung:</strong></p>
        ${(r.winners||[]).length ? r.winners.map(w => `<div class="winner">🎉 ${esc(w.user)} → ${w.count} Ticket(s)</div>`).join('') : '<div class="empty">Niemand hat Tickets erhalten.</div>'}
      ` : `
        <div class="row" style="margin-top:10px;">
          <input id="want-${r.id}" type="number" min="1" max="2" placeholder="1-2" style="width:70px;margin-bottom:0;" />
          <button class="btn-sm" onclick="joinRaffle('${r.id}')">+ Anmelden (max. 2)</button>
          ${interested.length ? `<button class="btn-accent" onclick="startDraw('${r.id}')">🎲 Jetzt auslosen</button>` : ''}
        </div>
      `}
    </div>
  `;
}
async function addRaffle() {
  const title = document.getElementById('raf-title').value.trim();
  const ticket_count = parseInt(document.getElementById('raf-count').value);
  if (!title || !ticket_count || ticket_count < 1) return;
  await sb.from('raffles').insert({ title, ticket_count, owner: currentUser });
  await loadRaffles(); renderRaffles();
}
async function joinRaffle(id) {
  const input = document.getElementById('want-' + id);
  const count = parseInt(input.value);
  if (!count || count < 1) return;
  if (count > 2) { alert('Maximal 2 Tickets pro Anmeldung. Für mehr einfach mehrmals anmelden.'); return; }
  await sb.from('raffle_interest').insert({ raffle_id: id, username: currentUser, count });
  await loadRaffles(); renderRaffles();
}
async function removeEntry(entryId) {
  await sb.from('raffle_interest').delete().eq('id', entryId).eq('username', currentUser);
  await loadRaffles(); renderRaffles();
}

function computeRaffleRounds(ticketCount, entries) {
  let pool = entries.map(e => ({ id: e.id, username: e.username, count: e.count }));
  let remaining = ticketCount;
  const rounds = [];
  while (remaining > 0 && pool.length > 0) {
    const idx = Math.floor(Math.random() * pool.length);
    const winner = pool[idx];
    const given = Math.min(winner.count, remaining);
    rounds.push({ poolSnapshot: pool.slice(), winner, given });
    remaining -= given;
    pool = pool.filter((_, i) => i !== idx);
  }
  return rounds;
}
function startDraw(raffleId) {
  const r = cache.raffles.find(x => x.id === raffleId);
  if (!r || r.drawn) return;
  const entries = r.raffle_interest || [];
  if (!entries.length) return;
  const rounds = computeRaffleRounds(r.ticket_count, entries);
  drawState = { raffleId, rounds, currentRound: 0, collectedWinners: [] };
  const overlay = document.createElement('div');
  overlay.id = 'draw-overlay';
  overlay.innerHTML = `
    <div id="wheel-wrap">
      <div id="wheel"></div>
      <div id="wheel-pointer"></div>
    </div>
    <div id="wheel-legend"></div>
    <div id="draw-result"></div>
  `;
  document.body.appendChild(overlay);
  setTimeout(spinNextRound, 400);
}
function buildWheel(pool) {
  const seg = 360 / pool.length;
  const gradient = pool.map((e,i) => `${PALETTE_COLORS[i % PALETTE_COLORS.length]} ${i*seg}deg ${(i+1)*seg}deg`).join(', ');
  const wheel = document.getElementById('wheel');
  wheel.style.transition = 'none';
  wheel.style.transform = 'rotate(0deg)';
  wheel.style.background = `conic-gradient(${gradient})`;
  document.getElementById('wheel-legend').innerHTML = pool.map((e,i) => `
    <span style="font-size:12px;color:#e2e8f0;display:flex;align-items:center;gap:4px;">
      <span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${PALETTE_COLORS[i % PALETTE_COLORS.length]};"></span>
      ${esc(e.username)} (${e.count})
    </span>
  `).join('');
}
async function spinNextRound() {
  const ds = drawState;
  const round = ds.rounds[ds.currentRound];
  buildWheel(round.poolSnapshot);
  document.getElementById('draw-result').textContent = '';
  await new Promise(res => setTimeout(res, 60));
  const seg = 360 / round.poolSnapshot.length;
  const winnerIndex = round.poolSnapshot.findIndex(e => e.id === round.winner.id);
  const targetAngle = 360 * 6 - (winnerIndex + 0.5) * seg;
  const wheel = document.getElementById('wheel');
  wheel.style.transition = 'transform 3s cubic-bezier(0.12,0.67,0.1,0.99)';
  wheel.style.transform = `rotate(${targetAngle}deg)`;
  await new Promise(res => setTimeout(res, 3200));
  document.getElementById('draw-result').textContent = `🎉 ${round.winner.username} gewinnt ${round.given} Ticket(s)!`;
  ds.collectedWinners.push({ user: round.winner.username, count: round.given });
  ds.currentRound++;
  await new Promise(res => setTimeout(res, 1800));
  if (ds.currentRound < ds.rounds.length) {
    spinNextRound();
  } else {
    finishDraw();
  }
}
async function finishDraw() {
  const ds = drawState;
  const resEl = document.getElementById('draw-result');
  resEl.innerHTML += '<br><span style="font-size:14px;color:#94a3b8;">Verlosung abgeschlossen ✓</span>';
  await sb.from('raffles').update({ drawn: true, winners: ds.collectedWinners }).eq('id', ds.raffleId);
  await new Promise(res => setTimeout(res, 1600));
  document.getElementById('draw-overlay').remove();
  drawState = null;
  await loadRaffles(); renderRaffles();
}

// ---------- Init: Session wiederherstellen ----------
(async function init() {
  const { data } = await sb.auth.getSession();
  if (data.session) {
    currentUser = data.session.user.user_metadata?.username || data.session.user.email.split('@')[0];
    renderApp();
  } else {
    renderAuth();
  }
})();
</script>
